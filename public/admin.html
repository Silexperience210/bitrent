<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BitRent — Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-brand">⚡ Bit<span>Rent</span></a>
    <div class="nav-links">
      <span class="nav-badge admin">Admin</span>
      <a href="/dashboard.html" class="btn btn-ghost btn-sm">Dashboard</a>
      <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="page">
  <div class="container">
    <h1 style="font-size:1.4rem;font-weight:700;margin-bottom:32px;">Admin Panel</h1>

    <!-- Platform Stats -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Miners</div><div class="stat-value" id="s-total-miners">—</div></div>
      <div class="stat-card"><div class="stat-label">Online</div><div class="stat-value" id="s-online">—</div></div>
      <div class="stat-card"><div class="stat-label">Active Rentals</div><div class="stat-value" id="s-active">—</div></div>
      <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value" id="s-users">—</div></div>
      <div class="stat-card"><div class="stat-label">Monthly Revenue</div><div class="stat-value btc" id="s-rev">—</div><div class="stat-sub">sats (30d)</div></div>
    </div>

    <!-- Miners Management -->
    <div class="section-header">
      <h2 class="section-title">Miners</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost btn-sm" onclick="loadStats(); loadMiners()">↻ Refresh</button>
        <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Add Miner</button>
      </div>
    </div>

    <div id="miners-container">
      <div style="text-align:center;padding:40px;color:var(--text-muted);">Loading...</div>
    </div>

    <!-- Recent Rentals -->
    <div class="section-header" style="margin-top:40px;">
      <h2 class="section-title">Recent Rentals</h2>
    </div>
    <div id="rentals-container">
      <div style="text-align:center;padding:40px;color:var(--text-muted);">Loading...</div>
    </div>
  </div>
</div>

<!-- Add/Edit Miner Modal -->
<div class="modal-backdrop" id="modal-miner">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="miner-modal-title">Add Miner</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="miner-form-error" class="alert alert-error" style="display:none"></div>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="f-name" placeholder="e.g. Bitaxe Gamma #1">
    </div>
    <div class="form-group">
      <label>IP Address</label>
      <input type="text" id="f-ip" placeholder="192.168.1.x">
    </div>
    <div class="form-group">
      <label>Port</label>
      <input type="number" id="f-port" value="80">
    </div>
    <div class="form-group">
      <label>Hashrate (TH/s)</label>
      <input type="number" id="f-hashrate" step="0.01" placeholder="e.g. 0.6">
    </div>
    <div class="form-group">
      <label>Price (sats/minute)</label>
      <input type="number" id="f-sats" placeholder="e.g. 10">
    </div>
    <div class="form-group">
      <label>Model (optional)</label>
      <input type="text" id="f-model" placeholder="e.g. Bitaxe Gamma BM1397">
    </div>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" id="btn-save-miner" onclick="saveMiner()">Save Miner</button>
    </div>
  </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
let editingMinerId = null

document.addEventListener('DOMContentLoaded', () => {
  if (!Auth.requireAdmin()) return
  loadStats()
  loadMiners()
})

async function loadStats() {
  try {
    const d = await api.get('/api/admin/stats')
    document.getElementById('s-total-miners').textContent = d.miners.total
    document.getElementById('s-online').textContent = d.miners.online
    document.getElementById('s-active').textContent = d.rentals.active
    document.getElementById('s-users').textContent = d.users.total
    document.getElementById('s-rev').textContent = (d.revenue.monthly_sats || 0).toLocaleString()

    // Recent rentals table
    const rc = document.getElementById('rentals-container')
    if (!d.recent_rentals?.length) {
      rc.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">No rentals yet</div></div>`
    } else {
      rc.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead><tr><th>Miner</th><th>User</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
            <tbody>${d.recent_rentals.map(r => `
              <tr>
                <td>${r.miner_name || '—'}</td>
                <td style="font-family:monospace;font-size:0.8rem;color:var(--text-muted)">${r.user_pubkey}</td>
                <td class="price-btc">${(r.total_sats||0).toLocaleString()} sats</td>
                <td><span class="badge badge-${r.status}">${r.status}</span></td>
                <td style="color:var(--text-muted);font-size:0.8rem;">${new Date(r.created_at).toLocaleDateString()}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`
    }
  } catch (e) {
    console.error('Stats error:', e.message)
  }
}

async function loadMiners() {
  try {
    const { miners } = await api.get('/api/admin/miners')
    const c = document.getElementById('miners-container')
    if (!miners.length) {
      c.innerHTML = `<div class="empty"><div class="empty-icon">⛏️</div><div class="empty-title">No miners added yet</div><div class="empty-text"><button class="btn btn-primary btn-sm" onclick="openAddModal()">Add your first miner</button></div></div>`
      return
    }
    c.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Name</th><th>IP</th><th>Hashrate</th><th>Price</th>
            <th>Status</th><th>Uptime</th><th>Revenue</th><th>Actions</th>
          </tr></thead>
          <tbody>${miners.map(m => `
            <tr>
              <td><strong>${m.name}</strong></td>
              <td style="font-family:monospace;font-size:0.82rem;color:var(--text-muted)">${m.ip_address}</td>
              <td>${m.hashrate_specs} TH/s</td>
              <td class="price-btc">${m.sats_per_minute} sats/min</td>
              <td>
                <span class="badge badge-${m.status}">${m.status}</span>
                ${m.currently_rented ? '<span class="badge badge-active" style="margin-left:4px;">Rented</span>' : ''}
              </td>
              <td>${parseFloat(m.uptime_percentage||0).toFixed(1)}%</td>
              <td class="price-btc">${(m.total_revenue_sats||0).toLocaleString()}</td>
              <td>
                <div style="display:flex;gap:4px;">
                  <button class="btn btn-ghost btn-sm" onclick="toggleStatus('${m.id}','${m.status}')">
                    ${m.status === 'online' ? '⏸ Offline' : m.status === 'offline' ? '▶ Online' : '🔧 Maint'}
                  </button>
                  <button class="btn btn-danger btn-sm" onclick="deleteMiner('${m.id}','${m.name}')">✕</button>
                </div>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`
  } catch (e) {
    document.getElementById('miners-container').innerHTML = `<div class="alert alert-error">${e.message}</div>`
  }
}

async function toggleStatus(id, currentStatus) {
  const next = currentStatus === 'online' ? 'offline' : currentStatus === 'offline' ? 'online' : 'online'
  try {
    await api.patch(`/api/admin/miners?id=${id}`, { status: next })
    loadMiners()
  } catch (e) {
    alert(`Error: ${e.message}`)
  }
}

async function deleteMiner(id, name) {
  if (!confirm(`Delete miner "${name}"? This cannot be undone.`)) return
  try {
    await api.delete(`/api/admin/miners?id=${id}`)
    loadMiners()
    loadStats()
  } catch (e) {
    alert(`Cannot delete: ${e.message}`)
  }
}

function openAddModal() {
  editingMinerId = null
  document.getElementById('miner-modal-title').textContent = 'Add Miner'
  document.getElementById('miner-form-error').style.display = 'none'
  ;['f-name','f-ip','f-hashrate','f-sats','f-model'].forEach(id => {
    document.getElementById(id).value = ''
  })
  document.getElementById('f-port').value = 80
  document.getElementById('modal-miner').classList.add('open')
}

function closeModal() {
  document.getElementById('modal-miner').classList.remove('open')
}

async function saveMiner() {
  const errEl = document.getElementById('miner-form-error')
  errEl.style.display = 'none'
  const body = {
    name: document.getElementById('f-name').value.trim(),
    ip_address: document.getElementById('f-ip').value.trim(),
    port: parseInt(document.getElementById('f-port').value) || 80,
    hashrate_specs: parseFloat(document.getElementById('f-hashrate').value),
    sats_per_minute: parseInt(document.getElementById('f-sats').value),
    metadata: { model: document.getElementById('f-model').value.trim() || 'Bitaxe' },
  }
  if (!body.name || !body.ip_address || !body.hashrate_specs || !body.sats_per_minute) {
    errEl.textContent = 'All fields except model are required.'; errEl.style.display = ''; return
  }
  const btn = document.getElementById('btn-save-miner')
  btn.disabled = true; btn.textContent = 'Saving...'
  try {
    await api.post('/api/admin/miners', body)
    closeModal()
    loadMiners()
    loadStats()
  } catch (e) {
    errEl.textContent = e.message; errEl.style.display = ''
  } finally {
    btn.disabled = false; btn.textContent = 'Save Miner'
  }
}

document.getElementById('modal-miner').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal()
})
</script>
</body>
</html>
