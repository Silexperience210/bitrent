version: '3.8'

services:
  # Node.js Backend
  backend:
    build: .
    container_name: bitrent-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: 7d
      NWC_RELAY_URL: ${NWC_RELAY_URL}
      NWC_PUBKEY: ${NWC_PUBKEY}
      NWC_SECRET: ${NWC_SECRET}
      ADMIN_NOSTR_PUBKEY: ${ADMIN_NOSTR_PUBKEY}
      CORS_ORIGIN: http://localhost:3001
      API_BASE_URL: http://localhost:3000
      LOG_LEVEL: debug
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - bitrent
    depends_on:
      - db-migration
    command: npm run dev

  # Database Migration Service
  db-migration:
    image: alpine:latest
    container_name: bitrent-db-migration
    command: echo "Database is managed by Supabase. Connect to your Supabase project and run models/schema.sql"
    networks:
      - bitrent

  # Optional: Frontend (for testing)
  frontend:
    image: nginx:alpine
    container_name: bitrent-frontend
    ports:
      - "3001:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - bitrent
    depends_on:
      - backend

networks:
  bitrent:
    driver: bridge
