name: Deploy to Production

# Trigger on push to main branch
on:
  push:
    branches:
      - main
  # Allow manual trigger
  workflow_dispatch:

# Environment variables
env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io

jobs:
  # Pre-deployment checks
  checks:
    runs-on: ubuntu-latest
    name: Pre-Deployment Checks
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint 2>/dev/null || true

      - name: Run tests
        run: npm run test:all
        env:
          NODE_ENV: test

      - name: Security audit
        run: npm audit 2>/dev/null || true

      - name: SBOM generation
        run: npm run sbom 2>/dev/null || true

  # Build Docker image
  build:
    needs: checks
    runs-on: ubuntu-latest
    name: Build Docker Image
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to staging first
  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Staging
    environment:
      name: staging
      url: https://api-staging.bitrent.io
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Railway (Staging)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          npm install -g @railway/cli
          railway up --service bitrent-api-staging

      - name: Health check
        run: |
          sleep 15
          curl -f https://api-staging.bitrent.io/health || exit 1

      - name: Run smoke tests
        run: |
          bash scripts/smoke-tests.sh https://api-staging.bitrent.io

      - name: Notify Slack (Staging)
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ Staging deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment Successful*\nURL: https://api-staging.bitrent.io\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }

  # Wait for approval before production
  approval:
    needs: deploy-staging
    runs-on: ubuntu-latest
    name: Wait for Approval
    environment:
      name: production-approval
    steps:
      - name: Approve production deployment
        run: echo "Waiting for approval before production deployment"

  # Deploy to production
  deploy-production:
    needs: approval
    runs-on: ubuntu-latest
    name: Deploy to Production
    environment:
      name: production
      url: https://api.bitrent.io
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Railway (Production)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          npm install -g @railway/cli
          railway up --service bitrent-api

      - name: Health check
        run: |
          sleep 20
          curl -f https://api.bitrent.io/health || exit 1

      - name: Run smoke tests
        run: |
          bash scripts/smoke-tests.sh https://api.bitrent.io

      - name: Create deployment record
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: 'Automated deployment via GitHub Actions',
              auto_merge: false,
              required_contexts: []
            })

      - name: Notify Slack (Production)
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "🚀 Production deployment complete",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🚀 Production Deployment Complete*\nURL: https://api.bitrent.io\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }

      - name: Start monitoring
        run: |
          echo "Starting 24/7 monitoring for first week"
          # Integration with PagerDuty, Datadog, etc.

  # Rollback if critical error
  rollback-on-error:
    if: failure()
    needs: deploy-production
    runs-on: ubuntu-latest
    name: Automatic Rollback
    steps:
      - uses: actions/checkout@v3

      - name: Trigger rollback
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}
        run: |
          npm install -g @railway/cli
          # Get previous deployment
          railway redeploy -s bitrent-api
          
      - name: Notify team
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "🔄 Automatic rollback triggered",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🔄 Automatic Rollback Triggered*\nSomething went wrong with the deployment.\nPlease investigate immediately!\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
