name: Health Check

on:
  schedule:
    # Every 5 minutes during business hours (8 AM - 6 PM)
    - cron: '*/5 8-18 * * 1-5'
    # Every 30 minutes outside business hours
    - cron: '*/30 0-7,19-23 * * *'
    # Every hour on weekends
    - cron: '0 * * * 0,6'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to check'
        required: true
        type: choice
        options:
          - development
          - staging
          - production

jobs:
  health-check:
    runs-on: ubuntu-latest
    name: Health Check ${{ github.event.inputs.environment || 'all' }}
    
    strategy:
      matrix:
        environment: 
          - staging
          - production
        environment_url:
          - staging: https://staging.bitrent.io
            production: https://bitrent.io
    
    continue-on-error: true
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run health check
        env:
          ENVIRONMENT: ${{ matrix.environment }}
          BASE_URL: ${{ matrix.environment == 'production' && 'https://bitrent.io' || 'https://staging.bitrent.io' }}
        run: |
          chmod +x ./scripts/health-check.sh
          ./scripts/health-check.sh $ENVIRONMENT
      
      - name: Run API tests
        env:
          BASE_URL: ${{ matrix.environment == 'production' && 'https://bitrent.io' || 'https://staging.bitrent.io' }}
        run: |
          # Test critical endpoints
          declare -a endpoints=("/api/v1/health" "/api/v1/miners" "/api/v1/rentals")
          
          for endpoint in "${endpoints[@]}"; do
            echo "Testing $endpoint"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              "$BASE_URL$endpoint")
            
            if [[ "$STATUS" != "200" ]]; then
              echo "❌ $endpoint returned $STATUS"
              exit 1
            else
              echo "✓ $endpoint OK"
            fi
          done
      
      - name: Check response times
        env:
          BASE_URL: ${{ matrix.environment == 'production' && 'https://bitrent.io' || 'https://staging.bitrent.io' }}
        run: |
          RESPONSE_TIME=$(curl -s -o /dev/null -w "%{time_total}" \
            --max-time 10 \
            "$BASE_URL/api/v1/miners?limit=10")
          
          RESPONSE_TIME_MS=$(echo "scale=0; $RESPONSE_TIME * 1000" | bc)
          echo "Response time: ${RESPONSE_TIME_MS}ms"
          
          if (( RESPONSE_TIME_MS > 500 )); then
            echo "⚠️  Response time is slow (> 500ms)"
          elif (( RESPONSE_TIME_MS > 200 )); then
            echo "⚠️  Response time is acceptable but could be better"
          else
            echo "✓ Response time is good"
          fi
      
      - name: Check SSL certificate
        env:
          BASE_URL: ${{ matrix.environment == 'production' && 'https://bitrent.io' || 'https://staging.bitrent.io' }}
        run: |
          DOMAIN=$(echo $BASE_URL | sed 's|https://||')
          echo | openssl s_client -servername $DOMAIN -connect $DOMAIN:443 2>&1 | \
          openssl x509 -noout -dates || {
            echo "❌ SSL certificate check failed"
            exit 1
          }
      
      - name: Monitor uptime metric
        if: always()
        run: |
          STATUS=${{ job.status }}
          METRIC_VALUE=$([ "$STATUS" = "success" ] && echo "1" || echo "0")
          echo "Uptime metric: $METRIC_VALUE"
      
      - name: Create incident if down
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[INCIDENT] ${{ matrix.environment }} is down`,
              body: `Health check failed for ${{ matrix.environment }}!\n\nTime: ${new Date().toISOString()}`,
              labels: ['incident', 'health-check', '${{ matrix.environment }}'],
            });
      
      - name: Notify Slack (Success)
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "Health check passed ✅",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ Health Check Passed*\nEnvironment: `${{ matrix.environment }}`"
                  }
                }
              ]
            }
      
      - name: Notify Slack (Failure)
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "Health check failed ❌",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Health Check Failed*\nEnvironment: `${{ matrix.environment }}`\nPlease investigate!"
                  }
                }
              ]
            }
      
      - name: Create PagerDuty incident
        if: failure() && matrix.environment == 'production'
        uses: actions/github-script@v7
        with:
          script: |
            const axios = require('axios');
            await axios.post('https://events.pagerduty.com/v2/enqueue', {
              routing_key: '${{ secrets.PAGERDUTY_INTEGRATION_KEY }}',
              event_action: 'trigger',
              payload: {
                summary: 'Production health check failed',
                severity: 'critical',
                source: 'BitRent Health Check',
              },
            });
