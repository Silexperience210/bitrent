version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: bitrent-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-bitrent}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
      POSTGRES_DB: ${DB_NAME:-bitrent_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bitrent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: bitrent-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bitrent-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-bitrent}:${DB_PASSWORD:-dev_password}@postgres:5432/${DB_NAME:-bitrent_dev}
      REDIS_URL: redis://redis:6379
      API_PORT: 3000
      API_HOST: 0.0.0.0
      LOG_LEVEL: debug
      JWT_SECRET: ${JWT_SECRET:-dev_secret_key_change_in_production}
      SUPABASE_URL: ${SUPABASE_URL:-http://supabase:8000}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      NWC_RELAY_URL: ${NWC_RELAY_URL:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Development Server (optional)
  frontend:
    image: node:20-alpine
    container_name: bitrent-frontend
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - api

  # Mailhog for Email Testing (optional)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: bitrent-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: bitrent-network
