<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BitRent — Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-brand">⚡ Bit<span>Rent</span></a>
    <div class="nav-links" id="nav-auth"></div>
  </div>
</nav>

<div class="page">
  <div class="container">

    <!-- User header -->
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; flex-wrap:wrap; gap:12px;">
      <div>
        <h1 style="font-size:1.4rem; font-weight:700; margin-bottom:4px;">My Dashboard</h1>
        <p class="nav-user" id="user-pubkey" style="font-size:0.85rem; color:var(--text-muted);"></p>
      </div>
      <a href="/" class="btn btn-primary">+ Rent a Miner</a>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Active Rentals</div>
        <div class="stat-value" id="stat-active">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Rentals</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Spent</div>
        <div class="stat-value btc" id="stat-spent">—</div>
        <div class="stat-sub">sats</div>
      </div>
    </div>

    <!-- Active Rentals -->
    <div id="active-section" style="display:none;">
      <div class="section-header"><h2 class="section-title">⛏️ Active Mining</h2></div>
      <div id="active-list"></div>
    </div>

    <!-- Rental History -->
    <div class="section-header" style="margin-top:32px;">
      <h2 class="section-title">Rental History</h2>
      <button class="btn btn-ghost btn-sm" onclick="loadRentals()">↻ Refresh</button>
    </div>
    <div id="rentals-container">
      <div style="text-align:center;padding:40px;color:var(--text-muted);">Loading...</div>
    </div>
  </div>
</div>

<!-- Rental Detail Modal -->
<div class="modal-backdrop" id="modal-detail">
  <div class="modal" style="max-width:540px;">
    <div class="modal-header">
      <span class="modal-title">Rental Details</span>
      <button class="modal-close" onclick="document.getElementById('modal-detail').classList.remove('open')">×</button>
    </div>
    <div id="modal-detail-content"></div>
  </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
let rentals = []

document.addEventListener('DOMContentLoaded', () => {
  if (!Auth.requireAuth()) return
  setupNav()
  loadProfile()
  loadRentals()
  // Auto-refresh active rentals
  setInterval(refreshActive, CONFIG.POLL_MS * 2)
})

function setupNav() {
  const u = Auth.getUser()
  document.getElementById('user-pubkey').textContent = u?.pubkey || ''
  document.getElementById('nav-auth').innerHTML =
    (u?.is_admin ? `<a href="/admin.html" class="btn btn-secondary btn-sm">Admin</a>` : '') +
    `<a href="/" class="btn btn-secondary btn-sm">Marketplace</a>
     <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">Logout</button>`
}

async function loadProfile() {
  try {
    const { user } = await api.get('/api/auth/profile')
    document.getElementById('stat-active').textContent = user.stats.active_rentals
    document.getElementById('stat-total').textContent = user.stats.total_rentals
  } catch {}
}

async function loadRentals() {
  try {
    const { rentals: data } = await api.get('/api/rentals/list')
    rentals = data

    // Compute total spent
    const totalSats = data.reduce((s, r) => s + (r.total_sats || 0), 0)
    document.getElementById('stat-spent').textContent = totalSats.toLocaleString()

    // Active rentals
    const active = data.filter(r => r.status === 'active')
    const activeSec = document.getElementById('active-section')
    if (active.length) {
      activeSec.style.display = ''
      document.getElementById('active-list').innerHTML = active.map(renderActiveCard).join('')
    } else {
      activeSec.style.display = 'none'
    }

    // History table
    const container = document.getElementById('rentals-container')
    if (!data.length) {
      container.innerHTML = `<div class="empty"><div class="empty-icon">⛏️</div><div class="empty-title">No rentals yet</div><div class="empty-text">Rent your first miner from the <a href="/">marketplace</a>.</div></div>`
      return
    }
    container.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Miner</th><th>Duration</th><th>Pool</th>
            <th>Cost</th><th>Status</th><th>Date</th><th></th>
          </tr></thead>
          <tbody>${data.map(r => `
            <tr>
              <td><strong>${r.miner_name}</strong><br><small style="color:var(--text-muted)">${r.hashrate_ths} TH/s</small></td>
              <td>${r.duration_minutes >= 60 ? (r.duration_minutes/60)+'h' : r.duration_minutes+'m'}</td>
              <td>${r.pool_name || '—'}</td>
              <td class="price-btc">${(r.total_sats||0).toLocaleString()} sats</td>
              <td><span class="badge badge-${r.status}">${r.status}</span></td>
              <td style="color:var(--text-muted);font-size:0.8rem;">${new Date(r.created_at).toLocaleDateString()}</td>
              <td><button class="btn btn-ghost btn-sm" onclick="showDetail('${r.id}')">View</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`
  } catch (e) {
    document.getElementById('rentals-container').innerHTML =
      `<div class="alert alert-error">${e.message}</div>`
  }
}

function renderActiveCard(r) {
  const endMs = new Date(r.end_time).getTime()
  const remaining = Math.max(0, Math.floor((endMs - Date.now()) / 60000))
  const pct = Math.round((1 - remaining / r.duration_minutes) * 100)
  return `
    <div class="card" style="margin-bottom:16px;" id="active-${r.id}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
        <div>
          <strong>${r.miner_name}</strong>
          <span class="badge badge-active" style="margin-left:8px;">Mining</span>
        </div>
        <span class="countdown" id="countdown-${r.id}">${formatTime(remaining)}</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="prog-${r.id}" style="width:${pct}%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:12px;font-size:0.8rem;color:var(--text-muted);">
        <span>Pool: <strong>${r.pool_name || '—'}</strong></span>
        <span>${(r.total_sats||0).toLocaleString()} sats paid</span>
      </div>
      <button class="btn btn-secondary btn-sm" style="margin-top:12px;" onclick="showDetail('${r.id}')">View Config</button>
    </div>`
}

function formatTime(minutes) {
  const h = Math.floor(minutes / 60)
  const m = minutes % 60
  return h > 0 ? `${h}h ${m.toString().padStart(2,'0')}m` : `${m}m`
}

async function refreshActive() {
  const active = rentals.filter(r => r.status === 'active')
  for (const r of active) {
    try {
      const data = await api.get(`/api/rentals/status?id=${r.id}`)
      // Update countdown
      const remaining = data.remaining_minutes
      const countEl = document.getElementById(`countdown-${r.id}`)
      if (countEl) countEl.textContent = formatTime(remaining)
      const progEl = document.getElementById(`prog-${r.id}`)
      if (progEl) {
        const pct = Math.round((1 - remaining / data.duration_minutes) * 100)
        progEl.style.width = `${pct}%`
      }
      if (data.status === 'completed') loadRentals()
    } catch {}
  }
}

async function showDetail(rentalId) {
  document.getElementById('modal-detail-content').innerHTML =
    `<div style="text-align:center;padding:32px;color:var(--text-muted);">Loading...</div>`
  document.getElementById('modal-detail').classList.add('open')
  try {
    const data = await api.get(`/api/rentals/status?id=${rentalId}`)
    document.getElementById('modal-detail-content').innerHTML = renderDetail(data)
  } catch (e) {
    document.getElementById('modal-detail-content').innerHTML =
      `<div class="alert alert-error">${e.message}</div>`
  }
}

function renderDetail(d) {
  const remainMins = d.remaining_minutes
  const endDate = new Date(d.end_time).toLocaleString()
  const statusBadge = `<span class="badge badge-${d.status}">${d.status}</span>`

  let configHtml = ''
  if (d.mining_config) {
    const c = d.mining_config
    configHtml = `
      <div style="margin-top:16px;">
        <div style="font-size:0.8rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;">Mining Configuration</div>
        <div class="config-card">
          <div class="config-row"><span class="config-key">Pool</span><span class="config-val">${c.pool_name}</span></div>
          <div class="config-row"><span class="config-key">Pool URL</span><span class="config-val">${c.pool_url}</span></div>
          <div class="config-row"><span class="config-key">Username</span><span class="config-val btc">${c.stratum_user}</span></div>
          <div class="config-row"><span class="config-key">Password</span><span class="config-val">x</span></div>
          <div class="config-row"><span class="config-key">Payout</span><span class="config-val btc">${c.payout_address}</span></div>
        </div>
      </div>`
  }

  return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
      <div class="stat-card card-sm">
        <div class="stat-label">Miner</div>
        <div style="font-weight:600;">${d.miner?.name || '—'}</div>
        <div class="stat-sub">${d.miner?.hashrate_ths} TH/s</div>
      </div>
      <div class="stat-card card-sm">
        <div class="stat-label">Status</div>
        <div style="margin-top:4px;">${statusBadge}</div>
      </div>
      <div class="stat-card card-sm">
        <div class="stat-label">Cost</div>
        <div style="font-weight:600;color:var(--btc)">${(d.total_sats||0).toLocaleString()} sats</div>
      </div>
      <div class="stat-card card-sm">
        <div class="stat-label">${d.status === 'active' ? 'Remaining' : 'Duration'}</div>
        <div style="font-weight:600;">${d.status === 'active' ? formatTime(remainMins) : `${d.duration_minutes} min`}</div>
        ${d.status === 'active' ? `<div class="stat-sub">ends ${endDate}</div>` : ''}
      </div>
    </div>
    ${configHtml}
    ${d.status === 'pending' ? '<div class="alert alert-info" style="margin-top:16px;">⚡ Waiting for Lightning payment to activate.</div>' : ''}`
}
</script>
</body>
</html>
