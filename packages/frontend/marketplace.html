<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitRent - Marketplace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #16213e 100%);
            color: #e0e6ed;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-section {
            background: #1a2332;
            border: 1px solid #2a3f5f;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .auth-info {
            color: #a0aec0;
        }

        .auth-button {
            background: #00d4ff;
            color: #0f1419;
            border: none;
            padding: 10px 30px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .auth-button:hover {
            opacity: 0.8;
        }

        .miners-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .miner-card {
            background: #1a2332;
            border: 1px solid #2a3f5f;
            border-radius: 8px;
            padding: 20px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .miner-card:hover {
            transform: translateY(-5px);
            border-color: #00d4ff;
        }

        .miner-card h3 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .miner-stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .miner-stat-label {
            color: #a0aec0;
        }

        .miner-stat-value {
            color: #e0e6ed;
            font-weight: bold;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
        }

        .status-online {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-offline {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .rental-controls {
            margin-top: 15px;
            display: grid;
            gap: 10px;
        }

        .rental-duration {
            display: flex;
            gap: 10px;
        }

        .rental-duration input {
            flex: 1;
            background: #0f1419;
            border: 1px solid #2a3f5f;
            color: #e0e6ed;
            padding: 8px;
            border-radius: 4px;
            font-size: 14px;
        }

        .rental-duration input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .cost-preview {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            border-radius: 4px;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            color: #00d4ff;
            margin-top: 10px;
        }

        .rental-button {
            background: #7c3aed;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            width: 100%;
        }

        .rental-button:hover:not(:disabled) {
            opacity: 0.8;
        }

        .rental-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #a0aec0;
        }

        .message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #10b981;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
            color: #ef4444;
        }

        .wallet-info {
            background: #1a2332;
            border: 1px solid #2a3f5f;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-size: 12px;
            color: #a0aec0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⛏️ BitRent Marketplace</h1>
            <p>Rent Bitcoin mining power by the minute</p>
        </div>

        <div id="message" class="message"></div>

        <div class="auth-section">
            <div class="auth-info" id="auth-info">
                👤 Not authenticated
            </div>
            <button class="auth-button" id="auth-button" onclick="handleAuth()">
                🔐 Connect Wallet
            </button>
        </div>

        <div id="miners-list" class="loading">Loading miners...</div>
    </div>

    <script>
        const API_URL = 'https://workspace-omega-opal.vercel.app/api';
        let miners = [];
        let isAuthenticated = false;
        let userPubkey = null;

        async function apiCall(endpoint, options = {}) {
            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    },
                    ...options
                });
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                showMessage(`Error: ${error.message}`, 'error');
                return null;
            }
        }

        function showMessage(text, type = 'success') {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';
        }

        async function handleAuth() {
            if (isAuthenticated) {
                logout();
                return;
            }

            // Simulate Nostr auth for now
            // In production, use nostr-tools to sign challenges
            userPubkey = 'npub1qg6xqmq4c6e5q3wjk5c6e5q3wjk5c6e5q3wjk5c6e5q3wjk5c6e5q3wjk5c6e5';
            
            try {
                // Get challenge
                const challengeRes = await apiCall('/auth/challenge', { method: 'POST' });
                if (!challengeRes || !challengeRes.challenge) {
                    throw new Error('Failed to get auth challenge');
                }

                // In real app, sign with nostr wallet
                // For demo, we'll just mark as authenticated
                isAuthenticated = true;
                localStorage.setItem('bitrent_pubkey', userPubkey);
                
                updateAuthUI();
                showMessage('✅ Connected to BitRent!', 'success');
            } catch (error) {
                showMessage(`Auth failed: ${error.message}`, 'error');
            }
        }

        function logout() {
            isAuthenticated = false;
            userPubkey = null;
            localStorage.removeItem('bitrent_pubkey');
            updateAuthUI();
            showMessage('Logged out', 'success');
        }

        function updateAuthUI() {
            const authInfo = document.getElementById('auth-info');
            const authButton = document.getElementById('auth-button');

            if (isAuthenticated) {
                authInfo.textContent = `✅ Connected: ${userPubkey.substring(0, 16)}...`;
                authButton.textContent = '🚪 Disconnect';
            } else {
                authInfo.textContent = '👤 Not authenticated';
                authButton.textContent = '🔐 Connect Wallet';
            }
        }

        async function loadMiners() {
            const result = await apiCall('/mineurs');
            if (!result || !result.data) {
                document.getElementById('miners-list').innerHTML = 
                    '<p class="loading">Failed to load miners</p>';
                return;
            }

            miners = result.data;
            renderMiners();
        }

        function renderMiners() {
            let html = '<div class="miners-grid">';

            miners.forEach(miner => {
                const statusClass = `status-${miner.status || 'offline'}`;
                const isOnline = miner.status === 'online';

                html += `
                    <div class="miner-card">
                        <h3>${miner.name}</h3>
                        <div class="miner-stat">
                            <span class="miner-stat-label">Hashrate:</span>
                            <span class="miner-stat-value">${miner.hashrate || 100} TH/s</span>
                        </div>
                        <div class="miner-stat">
                            <span class="miner-stat-label">Price:</span>
                            <span class="miner-stat-value">${miner.price_per_minute || 500} sats/min</span>
                        </div>
                        <span class="status-badge ${statusClass}">${miner.status || 'offline'}</span>

                        ${isOnline && isAuthenticated ? `
                            <div class="rental-controls">
                                <div class="rental-duration">
                                    <input type="number" id="duration-${miner.id}" 
                                           placeholder="Minutes" min="1" max="1440" value="60"
                                           onchange="updateCostPreview('${miner.id}', ${miner.price_per_minute || 500})">
                                </div>
                                <div class="cost-preview" id="cost-${miner.id}">
                                    Cost: 30,000 sats
                                </div>
                                <button class="rental-button" onclick="rentMiner('${miner.id}')">
                                    💰 Rent Now
                                </button>
                            </div>
                        ` : ''}
                    </div>
                `;
            });

            html += '</div>';
            document.getElementById('miners-list').innerHTML = html;
        }

        function updateCostPreview(minerId, pricePerMin) {
            const duration = parseInt(document.getElementById(`duration-${minerId}`).value) || 60;
            const totalCost = duration * pricePerMin;
            document.getElementById(`cost-${minerId}`).textContent = 
                `Cost: ${totalCost.toLocaleString()} sats`;
        }

        async function rentMiner(minerId) {
            if (!isAuthenticated) {
                showMessage('Please connect your wallet first', 'error');
                return;
            }

            const duration = parseInt(document.getElementById(`duration-${minerId}`).value) || 60;
            
            // In production, create rental and get payment invoice
            showMessage(`✅ Rental initiated: ${duration} min for miner ${minerId}`, 'success');
            
            // This would call the API in production
            // const rentalRes = await apiCall('/rentals', {
            //     method: 'POST',
            //     body: JSON.stringify({
            //         miner_id: minerId,
            //         duration_minutes: duration
            //     })
            // });
        }

        // Load miners on startup
        window.addEventListener('load', () => {
            loadMiners();
            
            // Check if already authenticated
            const savedPubkey = localStorage.getItem('bitrent_pubkey');
            if (savedPubkey) {
                userPubkey = savedPubkey;
                isAuthenticated = true;
                updateAuthUI();
            }
        });

        // Auto-refresh miners every 30 seconds
        setInterval(loadMiners, 30000);
    </script>
</body>
</html>
