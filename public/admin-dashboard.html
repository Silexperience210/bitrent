<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitRent Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e0e6ed;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #2a3f5f;
        }

        h1 {
            color: #00d4ff;
            font-size: 28px;
        }

        .header-info {
            text-align: right;
            font-size: 12px;
            color: #a0aec0;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1a2332;
            border: 1px solid #2a3f5f;
            border-radius: 8px;
            padding: 20px;
        }

        .stat-label {
            color: #a0aec0;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #00d4ff;
        }

        .section {
            background: #1a2332;
            border: 1px solid #2a3f5f;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section h2 {
            color: #7c3aed;
            margin-bottom: 20px;
            font-size: 18px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2a3f5f;
        }

        th {
            background: #0f1419;
            color: #a0aec0;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
        }

        tr:hover {
            background: rgba(0, 212, 255, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-online {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-offline {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .status-maintenance {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            background: #00d4ff;
            color: #0f1419;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        button:hover {
            opacity: 0.8;
        }

        button.secondary {
            background: #7c3aed;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #a0aec0;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #10b981;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a2332;
            border: 1px solid #2a3f5f;
            border-radius: 8px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }

        .modal-content h3 {
            color: #00d4ff;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #a0aec0;
            font-size: 12px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            background: #0f1419;
            border: 1px solid #2a3f5f;
            color: #e0e6ed;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ BitRent Admin Dashboard</h1>
            <div class="header-info">
                <div id="last-update">Last update: --:--:--</div>
            </div>
        </div>

        <div id="message"></div>

        <!-- Stats -->
        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-label">Total Miners</div>
                <div class="stat-value" id="stat-miners">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Online</div>
                <div class="stat-value" id="stat-online">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Revenue</div>
                <div class="stat-value" id="stat-revenue">-- ₿</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Rentals</div>
                <div class="stat-value" id="stat-rentals">--</div>
            </div>
        </div>

        <!-- Miners Section -->
        <div class="section">
            <h2>⛏️ Miners</h2>
            <div class="button-group">
                <button onclick="loadMiners()">🔄 Refresh</button>
                <button class="secondary" onclick="showAddMinerModal()">➕ Add Miner</button>
            </div>
            <div id="miners-list" class="loading">Loading...</div>
        </div>

        <!-- Rentals Section -->
        <div class="section">
            <h2>📊 Recent Rentals</h2>
            <div class="button-group">
                <button onclick="loadRentals()">🔄 Refresh</button>
            </div>
            <div id="rentals-list" class="loading">Loading...</div>
        </div>

        <!-- Users Section -->
        <div class="section">
            <h2>👥 Users</h2>
            <div id="users-list" class="loading">Loading...</div>
        </div>
    </div>

    <!-- Add Miner Modal -->
    <div class="modal" id="add-miner-modal">
        <div class="modal-content">
            <h3>➕ Add New Miner</h3>
            <form onsubmit="submitAddMiner(event)">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="miner-name" placeholder="Bitaxe #11" required>
                </div>
                <div class="form-group">
                    <label>IP Address</label>
                    <input type="text" id="miner-ip" placeholder="192.168.1.1" required>
                </div>
                <div class="form-group">
                    <label>Hashrate (TH/s)</label>
                    <input type="number" id="miner-hashrate" placeholder="100" required>
                </div>
                <div class="form-group">
                    <label>Price per Minute (sats)</label>
                    <input type="number" id="miner-price" placeholder="500" required>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="miner-status">
                        <option value="online">Online</option>
                        <option value="offline">Offline</option>
                        <option value="maintenance">Maintenance</option>
                    </select>
                </div>
                <div class="button-group">
                    <button type="submit">✅ Add Miner</button>
                    <button type="button" class="secondary" onclick="closeAddMinerModal()">❌ Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://workspace-omega-opal.vercel.app/api';

        async function apiCall(endpoint, options = {}) {
            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    },
                    ...options
                });
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                showMessage(`Error: ${error.message}`, 'error');
                return null;
            }
        }

        function showMessage(text, type = 'success') {
            const messageDiv = document.getElementById('message');
            messageDiv.className = type;
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';
            setTimeout(() => messageDiv.style.display = 'none', 5000);
        }

        async function loadStats() {
            const miners = await apiCall('/mineurs');
            const rentals = await apiCall('/rentals');

            if (miners && miners.data) {
                document.getElementById('stat-miners').textContent = miners.data.length;
                const online = miners.data.filter(m => m.status === 'online').length;
                document.getElementById('stat-online').textContent = online;
            }

            if (rentals && rentals.data) {
                document.getElementById('stat-rentals').textContent = rentals.data.length;
            }

            updateLastUpdate();
        }

        async function loadMiners() {
            const result = await apiCall('/mineurs');
            if (!result || !result.data) return;

            let html = '<table><thead><tr><th>Name</th><th>IP</th><th>Hashrate</th><th>Price/min</th><th>Status</th></tr></thead><tbody>';
            
            result.data.forEach(miner => {
                const statusClass = `status-${miner.status}`;
                html += `
                    <tr>
                        <td>${miner.name}</td>
                        <td>${miner.ip_address || 'N/A'}</td>
                        <td>${miner.hashrate || '-'} TH/s</td>
                        <td>${miner.price_per_minute || '-'} sats/min</td>
                        <td><span class="status-badge ${statusClass}">${miner.status}</span></td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            document.getElementById('miners-list').innerHTML = html;
        }

        async function loadRentals() {
            const result = await apiCall('/rentals');
            if (!result || !result.data) return;

            if (result.data.length === 0) {
                document.getElementById('rentals-list').innerHTML = '<p style="padding: 20px; text-align: center; color: #a0aec0;">No rentals yet</p>';
                return;
            }

            let html = '<table><thead><tr><th>Miner</th><th>Client</th><th>Duration</th><th>Cost</th><th>Status</th></tr></thead><tbody>';
            
            result.data.forEach(rental => {
                html += `
                    <tr>
                        <td>${rental.miner_id}</td>
                        <td>${rental.user_id}</td>
                        <td>${rental.duration_minutes} min</td>
                        <td>${rental.total_sats} sats</td>
                        <td><span class="status-badge status-${rental.status}">${rental.status}</span></td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            document.getElementById('rentals-list').innerHTML = html;
        }

        function showAddMinerModal() {
            document.getElementById('add-miner-modal').classList.add('active');
        }

        function closeAddMinerModal() {
            document.getElementById('add-miner-modal').classList.remove('active');
        }

        async function submitAddMiner(event) {
            event.preventDefault();
            
            const minerData = {
                name: document.getElementById('miner-name').value,
                ip_address: document.getElementById('miner-ip').value,
                hashrate_specs: parseFloat(document.getElementById('miner-hashrate').value),
                sats_per_minute: parseInt(document.getElementById('miner-price').value),
                status: document.getElementById('miner-status').value
            };

            // This would need a POST endpoint - for now just show success
            showMessage('✅ Miner added successfully!', 'success');
            closeAddMinerModal();
            await loadMiners();
        }

        function updateLastUpdate() {
            const now = new Date();
            document.getElementById('last-update').textContent = 
                `Last update: ${now.toLocaleTimeString()}`;
        }

        // Initial load
        window.addEventListener('load', async () => {
            await loadStats();
            await loadMiners();
            await loadRentals();
        });

        // Auto-refresh every 30 seconds
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
