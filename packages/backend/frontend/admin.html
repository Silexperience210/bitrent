<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BitRent - Admin Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .navbar {
      background: #1e293b;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #334155;
    }

    .logo {
      color: #f59e0b;
      font-weight: bold;
    }

    .btn {
      padding: 0.5rem 1rem;
      background: #f59e0b;
      color: #000;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }

    .btn:hover {
      background: #d97706;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: #334155;
      color: #e2e8f0;
    }

    .btn-secondary:hover {
      background: #475569;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid #334155;
    }

    .tab {
      padding: 1rem;
      cursor: pointer;
      background: none;
      border: none;
      color: #cbd5e1;
      border-bottom: 2px solid transparent;
      transition: all 0.3s;
    }

    .tab.active {
      color: #f59e0b;
      border-bottom-color: #f59e0b;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 1.5rem;
      border-radius: 0.5rem;
      border-left: 4px solid #f59e0b;
    }

    .stat-card h3 {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: bold;
      color: #f59e0b;
    }

    .table-section {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .table-header {
      background: #0f172a;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #334155;
    }

    .table-header h2 {
      color: #f59e0b;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #0f172a;
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid #334155;
      color: #f59e0b;
      font-weight: bold;
    }

    td {
      padding: 1rem;
      border-bottom: 1px solid #334155;
    }

    tr:hover {
      background: #1e293b;
    }

    .badge {
      padding: 0.25rem 0.75rem;
      border-radius: 0.25rem;
      font-size: 0.85rem;
      font-weight: bold;
    }

    .badge.active {
      background: #10b981;
      color: #fff;
    }

    .badge.pending {
      background: #f59e0b;
      color: #000;
    }

    .badge.inactive {
      background: #6b7280;
      color: #fff;
    }

    .actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn-small {
      padding: 0.3rem 0.6rem;
      font-size: 0.8rem;
      background: #334155;
      color: #e2e8f0;
    }

    .btn-small:hover {
      background: #475569;
    }

    .btn-danger {
      background: #dc2626;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    .form-section {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 1.5rem;
      border-radius: 0.5rem;
      max-width: 500px;
      margin-bottom: 2rem;
    }

    .form-section h3 {
      color: #f59e0b;
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.5rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.3rem;
      color: #e2e8f0;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #f59e0b;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 2rem;
      border-radius: 0.5rem;
      max-width: 500px;
      width: 90%;
    }

    .modal-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .modal-actions button {
      flex: 1;
    }

    .error {
      background: #7f1d1d;
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
    }

    .success {
      background: #1f2937;
      border: 1px solid #10b981;
      color: #86efac;
      padding: 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #f59e0b;
    }

    .status {
      text-align: right;
      font-size: 0.9rem;
    }

    .status.authenticated {
      color: #10b981;
    }

    .status.unauthenticated {
      color: #ef4444;
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="logo">⚡ BitRent - Admin Dashboard</div>
    <div>
      <button class="btn btn-secondary" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container">
    <!-- Status -->
    <div class="header">
      <h1>Admin Dashboard</h1>
      <div class="status authenticated" id="statusDiv">Authenticated</div>
    </div>

    <!-- Messages -->
    <div id="messageDiv"></div>

    <!-- Auth Check -->
    <div id="authCheckDiv" style="display:none;">
      <div class="error">Admin access required. Please login with admin credentials.</div>
      <button class="btn" onclick="location.href='client.html'">Back to Marketplace</button>
    </div>

    <!-- Content (shown only if admin) -->
    <div id="adminContent" style="display:none;">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('stats')">Statistics</button>
        <button class="tab" onclick="switchTab('miners')">Miners</button>
        <button class="tab" onclick="switchTab('rentals')">Rentals</button>
      </div>

      <!-- Statistics Tab -->
      <div id="stats" class="tab-content active">
        <div class="stats-grid" id="statsGrid"></div>
      </div>

      <!-- Miners Tab -->
      <div id="miners" class="tab-content">
        <div style="margin-bottom: 1.5rem;">
          <button class="btn" onclick="showAddMinerModal()">+ Add Miner</button>
        </div>

        <div class="table-section">
          <div class="table-header">
            <h2>Miners Inventory</h2>
          </div>
          <div id="minersList"></div>
        </div>
      </div>

      <!-- Rentals Tab -->
      <div id="rentals" class="tab-content">
        <div class="table-section">
          <div class="table-header">
            <h2>Active Rentals</h2>
          </div>
          <div id="rentalsList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Miner Modal -->
  <div class="modal" id="addMinerModal">
    <div class="modal-content">
      <h3>Add New Miner</h3>
      
      <div id="minerError" class="error" style="display:none;"></div>

      <div class="form-group">
        <label>IP Address:</label>
        <input type="text" id="minerIp" placeholder="192.168.1.100">
      </div>

      <div class="form-group">
        <label>Model:</label>
        <input type="text" id="minerModel" placeholder="Bitaxe">
      </div>

      <div class="form-group">
        <label>Hashrate (H/s):</label>
        <input type="number" id="minerHashrate" placeholder="1000000000">
      </div>

      <div class="form-group">
        <label>Price per Hour (sats):</label>
        <input type="number" id="minerPrice" placeholder="100">
      </div>

      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeAddMinerModal()">Cancel</button>
        <button class="btn" onclick="submitAddMiner()">Add Miner</button>
      </div>
    </div>
  </div>

  <script type="module">
    import apiClient from './js/api-client.js';
    
    window.api = apiClient;

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem('bitrent_token');
      const isAdmin = localStorage.getItem('bitrent_admin') === 'true';

      if (!token || !isAdmin) {
        document.getElementById('authCheckDiv').style.display = 'block';
        document.getElementById('adminContent').style.display = 'none';
        return;
      }

      document.getElementById('authCheckDiv').style.display = 'none';
      document.getElementById('adminContent').style.display = 'block';

      await loadStats();
      await loadMiners();
      await loadRentals();
    });

    async function loadStats() {
      try {
        const stats = await api.getPlatformStats();
        const html = `
          <div class="stat-card">
            <h3>Total Miners</h3>
            <div class="value">${stats.miners.total}</div>
          </div>
          <div class="stat-card">
            <h3>Active Miners</h3>
            <div class="value">${stats.miners.active}</div>
          </div>
          <div class="stat-card">
            <h3>Active Rentals</h3>
            <div class="value">${stats.rentals.active}</div>
          </div>
          <div class="stat-card">
            <h3>Completed Rentals</h3>
            <div class="value">${stats.rentals.completed}</div>
          </div>
          <div class="stat-card">
            <h3>Total Revenue</h3>
            <div class="value">${stats.revenue.total_sats.toLocaleString()}</div>
          </div>
          <div class="stat-card">
            <h3>Confirmed Payments</h3>
            <div class="value">${stats.revenue.confirmed_payments}</div>
          </div>
        `;
        document.getElementById('statsGrid').innerHTML = html;
      } catch (error) {
        showMessage('Error loading stats: ' + error.message, 'error');
      }
    }

    async function loadMiners() {
      try {
        document.getElementById('minersList').innerHTML = '<div class="loading">Loading...</div>';
        const miners = await api.getAllMiners();

        if (!miners || miners.length === 0) {
          document.getElementById('minersList').innerHTML = '<p style="padding: 1rem;">No miners found</p>';
          return;
        }

        let html = '<table><thead><tr><th>Model</th><th>IP</th><th>Hashrate</th><th>Price/Hour</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
        for (const miner of miners) {
          html += `
            <tr>
              <td>${miner.model}</td>
              <td>${miner.ip}</td>
              <td>${window.formatHashrate ? window.formatHashrate(miner.hashrate) : miner.hashrate}</td>
              <td>${miner.price_per_hour_sats} sats</td>
              <td><span class="badge ${miner.status}">${miner.status}</span></td>
              <td>
                <div class="actions">
                  <button class="btn-small" onclick="viewMinerStatus('${miner.id}')">Status</button>
                  <button class="btn-small btn-danger" onclick="deleteMiner('${miner.id}')">Delete</button>
                </div>
              </td>
            </tr>
          `;
        }
        html += '</tbody></table>';
        document.getElementById('minersList').innerHTML = html;
      } catch (error) {
        showMessage('Error loading miners: ' + error.message, 'error');
      }
    }

    async function loadRentals() {
      try {
        document.getElementById('rentalsList').innerHTML = '<div class="loading">Loading...</div>';
        const rentals = await api.getAllRentals();

        if (!rentals || rentals.length === 0) {
          document.getElementById('rentalsList').innerHTML = '<p style="padding: 1rem;">No active rentals</p>';
          return;
        }

        let html = '<table><thead><tr><th>Miner</th><th>User</th><th>Duration</th><th>Amount</th><th>Status</th></tr></thead><tbody>';
        for (const rental of rentals) {
          html += `
            <tr>
              <td>${rental.mineurs?.model}</td>
              <td>${rental.user_pubkey?.slice(0, 16)}...</td>
              <td>${rental.duration_hours}h</td>
              <td>${rental.amount_sats} sats</td>
              <td><span class="badge active">ACTIVE</span></td>
            </tr>
          `;
        }
        html += '</tbody></table>';
        document.getElementById('rentalsList').innerHTML = html;
      } catch (error) {
        showMessage('Error loading rentals: ' + error.message, 'error');
      }
    }

    window.switchTab = function(tab) {
      // Hide all tabs
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));

      // Show selected tab
      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');
    };

    window.showAddMinerModal = function() {
      document.getElementById('addMinerModal').classList.add('active');
    };

    window.closeAddMinerModal = function() {
      document.getElementById('addMinerModal').classList.remove('active');
      document.getElementById('minerError').style.display = 'none';
      document.getElementById('minerIp').value = '';
      document.getElementById('minerModel').value = '';
      document.getElementById('minerHashrate').value = '';
      document.getElementById('minerPrice').value = '';
    };

    window.submitAddMiner = async function() {
      try {
        const minerData = {
          ip: document.getElementById('minerIp').value,
          model: document.getElementById('minerModel').value,
          hashrate: parseInt(document.getElementById('minerHashrate').value),
          price_per_hour_sats: parseInt(document.getElementById('minerPrice').value),
        };

        if (!minerData.ip || !minerData.model || !minerData.hashrate || !minerData.price_per_hour_sats) {
          throw new Error('All fields are required');
        }

        await api.addMiner(minerData);
        showMessage('Miner added successfully!', 'success');
        closeAddMinerModal();
        await loadMiners();
      } catch (error) {
        document.getElementById('minerError').innerHTML = error.message;
        document.getElementById('minerError').style.display = 'block';
      }
    };

    window.deleteMiner = async function(minerId) {
      if (!confirm('Are you sure? This cannot be undone.')) return;

      try {
        await api.deleteMiner(minerId);
        showMessage('Miner deleted', 'success');
        await loadMiners();
      } catch (error) {
        showMessage('Error deleting miner: ' + error.message, 'error');
      }
    };

    window.viewMinerStatus = async function(minerId) {
      try {
        const status = await api.getMinerStatus(minerId);
        showMessage(JSON.stringify(status, null, 2), 'success');
      } catch (error) {
        showMessage('Error getting status: ' + error.message, 'error');
      }
    };

    window.logout = function() {
      localStorage.clear();
      location.href = 'client.html';
    };

    window.showMessage = function(message, type) {
      const div = document.getElementById('messageDiv');
      div.innerHTML = `<div class="${type}">${message}</div>`;
      setTimeout(() => {
        div.innerHTML = '';
      }, 5000);
    };

    window.formatHashrate = function(hashrate) {
      if (hashrate >= 1e9) return (hashrate / 1e9).toFixed(2) + ' GH/s';
      if (hashrate >= 1e6) return (hashrate / 1e6).toFixed(2) + ' MH/s';
      if (hashrate >= 1e3) return (hashrate / 1e3).toFixed(2) + ' KH/s';
      return hashrate + ' H/s';
    };
  </script>
</body>
</html>
