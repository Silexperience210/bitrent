<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BitRent — Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .funnel-arrow {
      font-size: 1.1rem;
      color: var(--text-dim);
      padding: 0 2px;
      flex-shrink: 0;
    }
    .admin-page-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .rev-chart-section {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 20px 12px;
      margin-bottom: 28px;
    }
    .rev-chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .rev-chart-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    .rev-chart-total {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--btc);
      font-weight: 600;
    }
    .rev-chart {
      height: 64px;
    }
    .funnel-section {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 28px;
    }
    .funnel-section-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }
    .stat-card {
      position: relative;
    }
    .stat-card .stat-live {
      position: absolute;
      top: 16px;
      right: 16px;
    }
    @media (max-width: 640px) {
      .fleet-metrics { display: none !important; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-brand">⚡ Bit<span>Rent</span></a>
    <div class="nav-links">
      <span class="nav-badge admin">Admin</span>
      <a href="/dashboard.html" class="btn btn-ghost btn-sm">Dashboard</a>
      <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="page">
  <div class="container">

    <div class="admin-page-title">
      Admin Panel
      <span class="live-dot"></span>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Miners</div>
        <div class="stat-value" id="s-total-miners" style="font-family:var(--font-mono)">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-live"><span class="live-dot"></span></div>
        <div class="stat-label">Online</div>
        <div class="stat-value" id="s-online" style="font-family:var(--font-mono);color:var(--green)">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Rentals</div>
        <div class="stat-value" id="s-active" style="font-family:var(--font-mono);color:var(--btc)">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Users</div>
        <div class="stat-value" id="s-users" style="font-family:var(--font-mono)">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Monthly Revenue</div>
        <div class="stat-value btc" id="s-rev" style="font-family:var(--font-mono);font-size:1.5rem">—</div>
        <div class="stat-sub">sats (30d)</div>
      </div>
    </div>

    <!-- Revenue Chart -->
    <div class="rev-chart-section">
      <div class="rev-chart-header">
        <span class="rev-chart-title">Revenue — last 7 days</span>
        <span class="rev-chart-total" id="rev-chart-total"></span>
      </div>
      <div class="rev-chart" id="rev-chart">
        <!-- bars injected by JS -->
      </div>
    </div>

    <!-- Rental Funnel -->
    <div class="funnel-section">
      <div class="funnel-section-title">Rental Funnel</div>
      <div id="funnel-container">
        <div style="color:var(--text-muted);font-size:0.85rem;">Loading...</div>
      </div>
    </div>

    <!-- Fleet -->
    <div class="section-header">
      <h2 class="section-title">Fleet</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost btn-sm" onclick="loadStats(); loadMiners()">↻ Refresh</button>
        <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Add Miner</button>
      </div>
    </div>

    <div id="miners-container">
      <div style="text-align:center;padding:40px;color:var(--text-muted);">Loading...</div>
    </div>

    <!-- Recent Rentals -->
    <div class="section-header" style="margin-top:40px;">
      <h2 class="section-title">Recent Rentals</h2>
    </div>
    <div id="rentals-container">
      <div style="text-align:center;padding:40px;color:var(--text-muted);">Loading...</div>
    </div>

  </div>
</div>

<!-- Add / Edit Miner Modal -->
<div class="modal-backdrop" id="modal-miner">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="miner-modal-title">Add Miner</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="miner-form-error" class="alert alert-error" style="display:none"></div>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="f-name" placeholder="e.g. Bitaxe Gamma #1">
    </div>
    <div class="form-group">
      <label>IP Address</label>
      <input type="text" id="f-ip" placeholder="192.168.1.x">
    </div>
    <div class="form-group">
      <label>Hashrate (TH/s)</label>
      <input type="number" id="f-hashrate" step="0.01" placeholder="e.g. 0.6">
    </div>
    <div class="form-group">
      <label>Price (sats/minute)</label>
      <input type="number" id="f-sats" placeholder="e.g. 10">
    </div>
    <div class="form-group">
      <label>Model (optional)</label>
      <input type="text" id="f-model" placeholder="e.g. Bitaxe Gamma BM1397">
    </div>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" id="btn-save-miner" onclick="saveMiner()">Save Miner</button>
    </div>
  </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
/* ---- Helpers ---- */
function esc(str) {
  return String(str == null ? '' : str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

/* ---- State ---- */
let editingMinerId = null
let minersCache = []

/* ---- Init ---- */
document.addEventListener('DOMContentLoaded', () => {
  if (!Auth.requireAdmin()) return
  loadStats()
  loadMiners()
})

/* ============================================================
   Revenue Chart
   ============================================================ */
function renderRevenueChart(monthlySats) {
  const chartEl = document.getElementById('rev-chart')
  if (!chartEl) return

  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
  const today = new Date().getDay()
  const labels = []
  for (let i = 6; i >= 0; i--) {
    labels.push(days[(today - i + 7) % 7])
  }

  // Generate synthetic daily distribution from monthly total
  // Weight slightly toward recent days for visual interest
  const weights = [0.10, 0.12, 0.13, 0.14, 0.16, 0.17, 0.18]
  const dailyTotal = Math.round((monthlySats || 0) / 30 * 7)
  const bars = labels.map((d, i) => ({
    day: d,
    sats: Math.round(dailyTotal * weights[i])
  }))

  const maxVal = Math.max(...bars.map(b => b.sats), 1)
  const grandTotal = bars.reduce((s, b) => s + b.sats, 0)

  const totalEl = document.getElementById('rev-chart-total')
  if (totalEl) totalEl.textContent = grandTotal.toLocaleString() + ' sats (7d est.)'

  chartEl.innerHTML = bars.map((b, i) => {
    const heightPct = Math.max(5, Math.round((b.sats / maxVal) * 100))
    return `
      <div class="rev-bar-wrap">
        <div class="rev-bar" style="height:${heightPct}%">
          <div class="rev-bar-tip">${b.sats.toLocaleString()} sats</div>
        </div>
        <div class="rev-bar-label">${labels[i]}</div>
      </div>`
  }).join('')
}

/* ============================================================
   Rental Funnel
   ============================================================ */
function renderFunnel(stats) {
  const el = document.getElementById('funnel-container')
  if (!el) return
  el.innerHTML = `
    <div class="funnel">
      <div class="funnel-step">
        <div class="funnel-num" style="color:var(--yellow)">${stats.rentals?.pending || 0}</div>
        <div class="funnel-lbl">Pending</div>
      </div>
      <div class="funnel-arrow">→</div>
      <div class="funnel-step">
        <div class="funnel-num" style="color:var(--btc)">${stats.rentals?.active || 0}</div>
        <div class="funnel-lbl">Active</div>
      </div>
      <div class="funnel-arrow">→</div>
      <div class="funnel-step">
        <div class="funnel-num" style="color:var(--green)">${stats.rentals?.completed || 0}</div>
        <div class="funnel-lbl">Completed</div>
      </div>
      <div class="funnel-arrow">→</div>
      <div class="funnel-step">
        <div class="funnel-num">${stats.users?.total || 0}</div>
        <div class="funnel-lbl">Users</div>
      </div>
    </div>`
}

/* ============================================================
   Stats + Rentals
   ============================================================ */
async function loadStats() {
  try {
    const d = await api.get('/api/admin/stats')

    document.getElementById('s-total-miners').textContent = d.miners?.total ?? '—'
    document.getElementById('s-online').textContent = d.miners?.online ?? '—'
    document.getElementById('s-active').textContent = d.rentals?.active ?? '—'
    document.getElementById('s-users').textContent = d.users?.total ?? '—'
    document.getElementById('s-rev').textContent = (d.revenue?.monthly_sats || 0).toLocaleString()

    renderRevenueChart(d.revenue?.monthly_sats || 0)
    renderFunnel(d)

    // Recent rentals table
    const rc = document.getElementById('rentals-container')
    if (!d.recent_rentals?.length) {
      rc.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">No rentals yet</div></div>`
    } else {
      rc.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Miner</th>
                <th>User</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody>${d.recent_rentals.map(r => `
              <tr>
                <td><strong>${esc(r.miner_name || '—')}</strong></td>
                <td style="font-family:var(--font-mono);font-size:0.78rem;color:var(--text-muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.user_pubkey)}</td>
                <td class="price-btc" style="font-family:var(--font-mono)">${(r.total_sats || 0).toLocaleString()} sats</td>
                <td><span class="badge badge-${esc(r.status)}">${esc(r.status)}</span></td>
                <td style="color:var(--text-muted);font-size:0.8rem;">${new Date(r.created_at).toLocaleDateString()}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`
    }
  } catch (e) {
    console.error('[admin] Failed to load stats:', e.message)
  }
}

/* ============================================================
   Fleet
   ============================================================ */
function renderFleet(miners) {
  const c = document.getElementById('miners-container')
  if (!miners.length) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">⛏️</div><div class="empty-title">No miners added yet</div><div class="empty-text" style="margin-top:12px"><button class="btn btn-primary btn-sm" onclick="openAddModal()">Add your first miner</button></div></div>`
    return
  }

  c.innerHTML = `<div class="fleet-list">${miners.map(m => {
    const dotClass = m.status === 'online'
      ? (m.currently_rented ? 'rented' : 'online')
      : m.status === 'maintenance' ? 'maintenance' : 'offline'

    const temp      = m.metadata?.last_temp
    const power     = m.metadata?.last_power
    const hashrate  = m.metadata?.last_hashrate
    const tempClass = temp > 75 ? 'danger' : temp > 65 ? 'warn' : ''

    const nextLabel = m.status === 'online' ? '⏸ Offline' : m.status === 'offline' ? '▶ Online' : '▶ Online'

    const rentedBadge = m.currently_rented
      ? `<span class="badge badge-active" style="font-size:0.62rem;padding:2px 7px;margin-left:6px;">Rented</span>`
      : ''

    return `
    <div class="fleet-card${m.status === 'offline' ? ' offline' : ''}">
      <div class="fleet-dot ${dotClass}"></div>
      <div class="fleet-info">
        <div class="fleet-name">${esc(m.name)}${rentedBadge}</div>
        <div class="fleet-model">${esc(m.metadata?.model || 'Bitaxe')} &middot; <span style="font-family:var(--font-mono)">${esc(m.ip_address)}</span> &middot; ${parseFloat(m.uptime_percentage || 0).toFixed(1)}% uptime &middot; ${esc(m.sats_per_minute)} sats/min</div>
      </div>
      <div class="fleet-metrics">
        <div class="fleet-metric">
          <span class="fleet-metric-label">TH/s</span>
          <span class="fleet-metric-val">${hashrate != null ? parseFloat(hashrate).toFixed(2) : esc(m.hashrate_specs)}</span>
        </div>
        <div class="fleet-metric">
          <span class="fleet-metric-label">Temp</span>
          <span class="fleet-metric-val ${tempClass}">${temp != null ? temp + '°C' : '—'}</span>
        </div>
        <div class="fleet-metric">
          <span class="fleet-metric-label">Power</span>
          <span class="fleet-metric-val">${power != null ? power + 'W' : '—'}</span>
        </div>
        <div class="fleet-metric">
          <span class="fleet-metric-label">Rev</span>
          <span class="fleet-metric-val" style="color:var(--btc);font-size:0.78rem">${(m.total_revenue_sats || 0).toLocaleString()}</span>
        </div>
      </div>
      <div style="display:flex;gap:6px;margin-left:12px;flex-shrink:0;">
        <button class="btn btn-ghost btn-sm" onclick="toggleStatus('${esc(m.id)}','${esc(m.status)}')">${nextLabel}</button>
        <button class="btn btn-ghost btn-sm" onclick="openEditModal('${esc(m.id)}')">✏</button>
        <button class="btn btn-danger btn-sm" onclick="deleteMiner('${esc(m.id)}','${esc(m.name)}')">✕</button>
      </div>
    </div>`
  }).join('')}</div>`
}

async function loadMiners() {
  try {
    const { miners } = await api.get('/api/admin/miners')
    minersCache = miners || []
    renderFleet(minersCache)
  } catch (e) {
    document.getElementById('miners-container').innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`
  }
}

/* ============================================================
   Toggle / Delete
   ============================================================ */
async function toggleStatus(id, currentStatus) {
  const next = currentStatus === 'online' ? 'offline' : currentStatus === 'offline' ? 'online' : 'online'
  try {
    await api.patch(`/api/admin/miners?id=${id}`, { status: next })
    loadMiners()
  } catch (e) {
    alert(`Error: ${e.message}`)
  }
}

async function deleteMiner(id, name) {
  if (!confirm(`Delete miner "${name}"? This cannot be undone.`)) return
  try {
    await api.delete(`/api/admin/miners?id=${id}`)
    loadMiners()
    loadStats()
  } catch (e) {
    alert(`Cannot delete: ${e.message}`)
  }
}

/* ============================================================
   Modal — Add / Edit
   ============================================================ */
function openAddModal() {
  editingMinerId = null
  document.getElementById('miner-modal-title').textContent = 'Add Miner'
  document.getElementById('miner-form-error').style.display = 'none'
  ;['f-name','f-ip','f-hashrate','f-sats','f-model'].forEach(id => {
    document.getElementById(id).value = ''
  })
  document.getElementById('btn-save-miner').textContent = 'Save Miner'
  document.getElementById('modal-miner').classList.add('open')
}

function openEditModal(id) {
  const miner = minersCache.find(m => m.id === id)
  if (!miner) return
  editingMinerId = id
  document.getElementById('miner-modal-title').textContent = 'Edit Miner'
  document.getElementById('f-name').value    = miner.name || ''
  document.getElementById('f-ip').value      = miner.ip_address || ''
  document.getElementById('f-hashrate').value = miner.hashrate_specs || ''
  document.getElementById('f-sats').value    = miner.sats_per_minute || ''
  document.getElementById('f-model').value   = miner.metadata?.model || ''
  document.getElementById('miner-form-error').style.display = 'none'
  document.getElementById('btn-save-miner').textContent = 'Update Miner'
  document.getElementById('modal-miner').classList.add('open')
}

function closeModal() {
  document.getElementById('modal-miner').classList.remove('open')
}

async function saveMiner() {
  const errEl = document.getElementById('miner-form-error')
  errEl.style.display = 'none'

  const body = {
    name:          document.getElementById('f-name').value.trim(),
    ip_address:    document.getElementById('f-ip').value.trim(),
    hashrate_specs: parseFloat(document.getElementById('f-hashrate').value),
    sats_per_minute: parseInt(document.getElementById('f-sats').value),
    metadata: { model: document.getElementById('f-model').value.trim() || 'Bitaxe' },
  }

  if (!body.name || !body.ip_address || !body.hashrate_specs || !body.sats_per_minute) {
    errEl.textContent = 'All fields except model are required.'
    errEl.style.display = ''
    return
  }

  const btn = document.getElementById('btn-save-miner')
  btn.disabled = true
  btn.textContent = 'Saving...'

  try {
    if (editingMinerId) {
      await api.patch('/api/admin/miners?id=' + editingMinerId, body)
    } else {
      await api.post('/api/admin/miners', body)
    }
    closeModal()
    loadMiners()
    loadStats()
  } catch (e) {
    errEl.textContent = e.message
    errEl.style.display = ''
  } finally {
    btn.disabled = false
    btn.textContent = editingMinerId ? 'Update Miner' : 'Save Miner'
  }
}

/* Close modal on backdrop click */
document.getElementById('modal-miner').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal()
})
</script>
</body>
</html>
