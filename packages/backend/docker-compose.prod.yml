version: '3.8'

# Production-grade Docker Compose for local testing
# NOT for production deployment (use Railway for that)

services:
  # Backend API
  bitrent-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bitrent-api-prod
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: 3000
      # Supabase
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: 7d
      # NWC
      NWC_RELAY_URL: ${NWC_RELAY_URL}
      NWC_PUBKEY: ${NWC_PUBKEY}
      NWC_SECRET: ${NWC_SECRET}
      # Admin
      ADMIN_NOSTR_PUBKEY: ${ADMIN_NOSTR_PUBKEY}
      # API Config
      CORS_ORIGIN: ${CORS_ORIGIN}
      API_BASE_URL: ${API_BASE_URL}
      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN}
      DATADOG_API_KEY: ${DATADOG_API_KEY}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: always
    networks:
      - bitrent-network
    volumes:
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: bitrent-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - bitrent-api
    networks:
      - bitrent-network
    restart: always

networks:
  bitrent-network:
    driver: bridge

volumes:
  logs:
    driver: local
