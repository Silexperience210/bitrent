# BitRent Supabase Configuration
# Database, authentication, and storage settings

[project]
# Project ID (replace with your actual project ID)
project_id = "bitrent-prod"
title = "BitRent"
description = "Bitcoin mining equipment rental platform"
region = "eu-west-1"
plan = "pro"

# Database configuration
[db]
# Pooling configuration
pool_mode = "transaction"
max_pool_size = 15
default_pool_size = 10
min_pool_size = 5

# Connection timeout (seconds)
connect_timeout = 10

# Statement timeout (milliseconds)
statement_timeout = 30000

# Idle transaction timeout (seconds)
idle_in_transaction_timeout = 60

# Replication settings
[db.replication]
enabled = true
max_wal_senders = 10
max_replication_slots = 10

# Authentication settings
[auth]
# Enable email-based signup
email_autoconfirm = false
email_change_token_new_token_sent_or_confirmation_email_first = "confirmation_then_change"
email_double_confirm_changes = true

# Enable phone authentication
phone_autoconfirm = false

# Session timeout (hours)
session_lifetime = 24

# Mfa enforced = false means it's optional
mfa_enforced = false

# JWT settings
jwt_exp = 3600
jwt_alg = "HS256"

# Webhook events
enable_signup = true
enable_confirmations = true
enable_recoveries = true
enable_email_change = true

# Storage configuration
[storage]
file_size_limit = 52428800  # 50MB
allowed_mime_types = [
  "image/*",
  "application/json",
  "application/octet-stream",
  "text/plain",
  "application/pdf"
]

# Buckets
[[storage.buckets]]
name = "avatars"
public = true
file_size_limit = 5242880  # 5MB
allowed_mime_types = ["image/*"]

[[storage.buckets]]
name = "documents"
public = false
file_size_limit = 52428800  # 50MB
allowed_mime_types = ["application/pdf", "application/json"]

[[storage.buckets]]
name = "backups"
public = false
file_size_limit = 1073741824  # 1GB
allowed_mime_types = ["application/octet-stream"]

# Realtime configuration
[realtime]
enabled = true
max_bytes_per_second = 10485760  # 10MB/s
max_message_size = 262144  # 256KB

# Broadcast settings
broadcast_acks_enabled = true
broadcast_presence_enabled = true

# Security settings
[security]
# Enable network restrictions
network_restrictions = false

# IP whitelist (optional)
ip_whitelist = []

# CORS settings
cors_allowed_origins = [
  "http://localhost:3000",
  "http://localhost:5173",
  "https://bitrent.example.com"
]

# Rate limiting
[security.rate_limiting]
# Requests per minute per IP
default_rps = 100

# Auth endpoints
auth_rps = 10

# API endpoints
api_rps = 50

# Storage endpoints
storage_rps = 100

# Backup configuration
[backups]
# Automated daily backups
enabled = true
backup_time = "02:00"  # UTC
retention_days = 30

# Point-in-time recovery
pitr_enabled = true
pitr_days = 7

# Backup encryption
encryption_enabled = true

# Webhook configuration
[webhooks]
enabled = true
max_payload_size = 1048576  # 1MB

# Event subscriptions
[[webhooks.subscriptions]]
events = ["auth.signup", "auth.user_confirmed"]
endpoint = "https://example.com/webhooks/auth"
headers = [
  { key = "Authorization", value = "Bearer secret_key" }
]

# Database event subscriptions
[[webhooks.subscriptions]]
events = [
  "postgres_changes:INSERT:public.rentals",
  "postgres_changes:UPDATE:public.payments"
]
endpoint = "https://example.com/webhooks/database"
headers = [
  { key = "Authorization", value = "Bearer secret_key" }
]

# Logging configuration
[logging]
enabled = true

# Log levels: debug, info, warn, error
log_level = "info"

# Log retention
retention_days = 90

# Performance monitoring
[monitoring]
# Enable query performance insights
query_insights_enabled = true

# Slow query threshold (milliseconds)
slow_query_threshold = 1000

# Enable connection pooling metrics
pooling_metrics_enabled = true

# Environment-specific overrides
[env.staging]
plan = "pro"
max_pool_size = 10
default_pool_size = 5

[env.production]
plan = "pro"
max_pool_size = 20
default_pool_size = 15
session_lifetime = 24
jwt_exp = 3600
