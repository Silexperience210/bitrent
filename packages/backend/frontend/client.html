<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BitRent - Marketplace</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .navbar {
      background: #1e293b;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #334155;
    }

    .logo {
      color: #f59e0b;
      font-weight: bold;
    }

    .btn {
      padding: 0.5rem 1rem;
      background: #f59e0b;
      color: #000;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }

    .btn:hover {
      background: #d97706;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: #334155;
      color: #e2e8f0;
    }

    .btn-secondary:hover {
      background: #475569;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .status {
      text-align: right;
    }

    .status.authenticated {
      color: #10b981;
    }

    .status.unauthenticated {
      color: #ef4444;
    }

    .miners-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .miner-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      padding: 1.5rem;
      transition: all 0.3s;
    }

    .miner-card:hover {
      border-color: #f59e0b;
      transform: translateY(-5px);
    }

    .miner-card h3 {
      color: #f59e0b;
      margin-bottom: 1rem;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid #334155;
      font-size: 0.9rem;
    }

    .stat:last-child {
      border-bottom: none;
    }

    .stat-value {
      font-weight: bold;
      color: #f59e0b;
    }

    .miner-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }

    .miner-actions button {
      flex: 1;
      padding: 0.5rem;
      font-size: 0.9rem;
    }

    .auth-section {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 2rem;
      border-radius: 0.5rem;
      max-width: 400px;
      margin: 2rem auto;
      text-align: center;
    }

    .auth-section h2 {
      color: #f59e0b;
      margin-bottom: 1rem;
    }

    .auth-section p {
      color: #cbd5e1;
      margin-bottom: 1rem;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 2rem;
      border-radius: 0.5rem;
      max-width: 400px;
      width: 90%;
    }

    .modal-content h3 {
      color: #f59e0b;
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.5rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.3rem;
      color: #e2e8f0;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #f59e0b;
    }

    .modal-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .modal-actions button {
      flex: 1;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #f59e0b;
    }

    .error {
      background: #7f1d1d;
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
    }

    .success {
      background: #1f2937;
      border: 1px solid #10b981;
      color: #86efac;
      padding: 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
    }

    .rentals-section {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 2rem;
      border-radius: 0.5rem;
      margin-bottom: 2rem;
    }

    .rentals-section h2 {
      color: #f59e0b;
      margin-bottom: 1rem;
    }

    .rental-item {
      background: #0f172a;
      padding: 1rem;
      border-radius: 0.3rem;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .rental-info {
      flex: 1;
    }

    .rental-status {
      padding: 0.25rem 0.75rem;
      background: #10b981;
      color: #fff;
      border-radius: 0.25rem;
      font-size: 0.85rem;
      font-weight: bold;
    }

    .rental-status.pending {
      background: #f59e0b;
      color: #000;
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="logo">⚡ BitRent - Client</div>
    <div>
      <button class="btn btn-secondary" onclick="logout()" id="logoutBtn" style="display:none;">Logout</button>
      <button class="btn" onclick="showAuthModal()" id="loginBtn">Login with Nostr</button>
    </div>
  </nav>

  <div class="container">
    <!-- Status -->
    <div class="header" id="statusDiv">
      <h1>Bitcoin Mining Marketplace</h1>
      <div class="status unauthenticated">Not authenticated</div>
    </div>

    <!-- Messages -->
    <div id="messageDiv"></div>

    <!-- Active Rentals -->
    <div class="rentals-section" id="rentalsSection" style="display:none;">
      <h2>Your Active Rentals</h2>
      <div id="rentalsList"></div>
    </div>

    <!-- Miners Grid -->
    <div id="minersList"></div>

    <!-- Auth Modal -->
    <div class="modal" id="authModal">
      <div class="modal-content">
        <h3>Login with Nostr</h3>
        <p>Connect your Nostr wallet to continue</p>
        
        <div class="form-group">
          <label>Nostr Extension:</label>
          <p style="font-size: 0.85rem; color: #94a3b8;">
            Make sure you have a Nostr extension installed (like Nos2x)
          </p>
        </div>

        <div id="authError" class="error" style="display:none;"></div>

        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="closeAuthModal()">Cancel</button>
          <button class="btn" onclick="connectNostr()">Connect Wallet</button>
        </div>

        <p style="margin-top: 1rem; font-size: 0.8rem; color: #94a3b8;">
          * This requires a Nostr-enabled wallet (browser extension)
        </p>
      </div>
    </div>

    <!-- Rental Modal -->
    <div class="modal" id="rentalModal">
      <div class="modal-content">
        <h3>Create Rental</h3>
        
        <div class="form-group">
          <label>Duration (hours):</label>
          <input type="number" id="rentalDuration" value="24" min="1">
        </div>

        <div class="form-group">
          <label id="rentalPrice">Price: calculating...</label>
        </div>

        <div id="rentalError" class="error" style="display:none;"></div>

        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="closeRentalModal()">Cancel</button>
          <button class="btn" onclick="submitRental()">Rent Now</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import apiClient from './js/api-client.js';
    
    window.api = apiClient;

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      await updateUI();
      await loadMiners();
    });

    async function updateUI() {
      const token = localStorage.getItem('bitrent_token');
      const pubkey = localStorage.getItem('bitrent_pubkey');
      const statusDiv = document.getElementById('statusDiv');
      const loginBtn = document.getElementById('loginBtn');
      const logoutBtn = document.getElementById('logoutBtn');

      if (token && pubkey) {
        statusDiv.innerHTML = `
          <h1>Bitcoin Mining Marketplace</h1>
          <div class="status authenticated">Authenticated as ${pubkey.slice(0, 16)}...</div>
        `;
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'inline-block';
        document.getElementById('rentalsSection').style.display = 'block';
        await loadActiveRentals();
      } else {
        statusDiv.innerHTML = `
          <h1>Bitcoin Mining Marketplace</h1>
          <div class="status unauthenticated">Not authenticated</div>
        `;
        loginBtn.style.display = 'inline-block';
        logoutBtn.style.display = 'none';
        document.getElementById('rentalsSection').style.display = 'none';
      }
    }

    async function loadMiners() {
      try {
        document.getElementById('minersList').innerHTML = '<div class="loading">Loading miners...</div>';
        const miners = await api.getAvailableMiners();

        let html = '<div class="miners-grid">';
        if (miners && miners.length > 0) {
          for (const miner of miners) {
            html += `
              <div class="miner-card">
                <h3>${miner.model}</h3>
                <div class="stat">
                  <span>Hashrate:</span>
                  <span class="stat-value">${formatHashrate(miner.hashrate)}</span>
                </div>
                <div class="stat">
                  <span>IP Address:</span>
                  <span class="stat-value">${miner.ip}</span>
                </div>
                <div class="stat">
                  <span>Price/Hour:</span>
                  <span class="stat-value">${miner.price_per_hour_sats} sats</span>
                </div>
                <div class="stat">
                  <span>Status:</span>
                  <span class="stat-value">${miner.status}</span>
                </div>
                <div class="miner-actions">
                  <button class="btn" onclick="showRentalModal('${miner.id}', '${miner.model}', ${miner.price_per_hour_sats})">
                    Rent Now
                  </button>
                </div>
              </div>
            `;
          }
        } else {
          html += '<p style="grid-column: 1/-1; text-align: center;">No miners available</p>';
        }
        html += '</div>';
        document.getElementById('minersList').innerHTML = html;
      } catch (error) {
        showMessage('Error loading miners: ' + error.message, 'error');
      }
    }

    async function loadActiveRentals() {
      try {
        const rentals = await api.getActiveRentals();
        const rentalsList = document.getElementById('rentalsList');

        if (rentals && rentals.length > 0) {
          let html = '';
          for (const rental of rentals) {
            html += `
              <div class="rental-item">
                <div class="rental-info">
                  <p><strong>${rental.mineurs?.model}</strong></p>
                  <p style="font-size: 0.9rem; color: #94a3b8;">
                    ${rental.duration_hours}h rental • ${rental.amount_sats} sats
                  </p>
                </div>
                <span class="rental-status">${rental.status.toUpperCase()}</span>
              </div>
            `;
          }
          rentalsList.innerHTML = html;
        } else {
          rentalsList.innerHTML = '<p style="color: #94a3b8;">No active rentals</p>';
        }
      } catch (error) {
        console.error('Error loading rentals:', error);
      }
    }

    window.formatHashrate = function(hashrate) {
      if (hashrate >= 1e9) return (hashrate / 1e9).toFixed(2) + ' GH/s';
      if (hashrate >= 1e6) return (hashrate / 1e6).toFixed(2) + ' MH/s';
      if (hashrate >= 1e3) return (hashrate / 1e3).toFixed(2) + ' KH/s';
      return hashrate + ' H/s';
    };

    window.showAuthModal = function() {
      document.getElementById('authModal').classList.add('active');
    };

    window.closeAuthModal = function() {
      document.getElementById('authModal').classList.remove('active');
      document.getElementById('authError').style.display = 'none';
    };

    window.connectNostr = async function() {
      try {
        if (!window.nostr) {
          throw new Error('Nostr extension not found. Please install one (Nos2x, Alby, etc.)');
        }

        const pubkey = await window.nostr.getPublicKey();
        const challenge = await api.getNostrChallenge(pubkey);
        
        // In real implementation: sign challenge, send signature
        // For now, show message
        showMessage('Nostr integration requires signing. See documentation.', 'success');
        closeAuthModal();
      } catch (error) {
        document.getElementById('authError').innerHTML = error.message;
        document.getElementById('authError').style.display = 'block';
      }
    };

    window.showRentalModal = function(minerId, model, pricePerHour) {
      window.currentMinerId = minerId;
      document.getElementById('rentalModal').classList.add('active');
      updateRentalPrice(pricePerHour);
    };

    window.closeRentalModal = function() {
      document.getElementById('rentalModal').classList.remove('active');
    };

    window.updateRentalPrice = function(pricePerHour) {
      const duration = parseInt(document.getElementById('rentalDuration').value) || 1;
      const total = duration * pricePerHour;
      document.getElementById('rentalPrice').textContent = `Price: ${total} sats`;
    };

    window.submitRental = async function() {
      const token = localStorage.getItem('bitrent_token');
      if (!token) {
        showMessage('Please login first', 'error');
        return;
      }

      try {
        const duration = parseInt(document.getElementById('rentalDuration').value);
        const rental = await api.createRental(window.currentMinerId, duration);
        
        showMessage(`Rental created! Invoice: ${rental.payment.invoice}`, 'success');
        closeRentalModal();
        await loadActiveRentals();
      } catch (error) {
        document.getElementById('rentalError').textContent = error.message;
        document.getElementById('rentalError').style.display = 'block';
      }
    };

    window.logout = function() {
      localStorage.removeItem('bitrent_token');
      localStorage.removeItem('bitrent_pubkey');
      updateUI();
      showMessage('Logged out', 'success');
    };

    window.showMessage = function(message, type) {
      const div = document.getElementById('messageDiv');
      div.innerHTML = `<div class="${type}">${message}</div>`;
      setTimeout(() => {
        div.innerHTML = '';
      }, 5000);
    };
  </script>
</body>
</html>
