<nav class="navbar">
  <div class="navbar-container">
    <!-- Brand -->
    <a href="/" class="navbar-brand">⚡ BitRent</a>

    <!-- Menu -->
    <div class="navbar-menu">
      <a href="/client.html" class="navbar-link" id="nav-marketplace">
        Marketplace
      </a>
      <a href="#" class="navbar-link" id="nav-admin" style="display: none;">
        Admin Dashboard
      </a>
    </div>

    <!-- User Section -->
    <div class="navbar-user">
      <!-- Login Button (show when not authenticated) -->
      <button
        class="btn btn-primary"
        id="nav-login-btn"
        style="display: none;"
      >
        Login with Nostr
      </button>

      <!-- User Profile (show when authenticated) -->
      <div class="user-dropdown" id="nav-user-dropdown" style="display: none;">
        <div class="user-avatar" id="nav-user-avatar">?</div>
        <div class="dropdown-menu">
          <a href="/index.html" class="dropdown-item" id="nav-profile-link">
            My Profile
          </a>
          <a
            href="#"
            class="dropdown-item"
            id="nav-settings-link"
          >
            Settings
          </a>
          <a href="#" class="dropdown-item" id="nav-role-indicator">
            Role: <span id="nav-role-text">User</span>
          </a>
          <a href="#" class="dropdown-item" id="nav-logout-btn">
            Logout
          </a>
        </div>
      </div>
    </div>
  </div>
</nav>

<script>
  /**
   * Initialize navbar on page load
   */
  function initNavbar() {
    if (!window.auth) {
      console.warn('[Navbar] Auth not initialized');
      return;
    }

    const loginBtn = document.getElementById('nav-login-btn');
    const userDropdown = document.getElementById('nav-user-dropdown');
    const navAdmin = document.getElementById('nav-admin');
    const logoutBtn = document.getElementById('nav-logout-btn');
    const userAvatar = document.getElementById('nav-user-avatar');
    const roleText = document.getElementById('nav-role-text');

    // Update UI based on auth state
    const isAuthenticated = auth.isAuthenticated();
    const isAdmin = auth.isAdmin();

    if (isAuthenticated) {
      loginBtn.style.display = 'none';
      userDropdown.style.display = 'block';

      // Get user info
      const user = auth.getUser();
      const pubkey = auth.pubkey;

      // Set avatar initial
      if (user?.name) {
        userAvatar.textContent = user.name.charAt(0).toUpperCase();
      } else if (pubkey) {
        userAvatar.textContent = pubkey.substr(0, 1).toUpperCase();
      }

      // Show admin link if admin
      if (isAdmin) {
        navAdmin.style.display = 'inline-block';
        roleText.textContent = 'Admin';
      } else {
        navAdmin.style.display = 'none';
        roleText.textContent = 'User';
      }
    } else {
      loginBtn.style.display = 'block';
      userDropdown.style.display = 'none';
      navAdmin.style.display = 'none';
    }

    // Event listeners
    loginBtn.addEventListener('click', () => {
      showLoginModal();
    });

    logoutBtn.addEventListener('click', (e) => {
      e.preventDefault();
      auth.logout();
    });

    // Close dropdown on click outside
    document.addEventListener('click', (e) => {
      if (!userDropdown.contains(e.target)) {
        userDropdown.classList.remove('active');
      }
    });
  }

  // Initialize when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initNavbar);
  } else {
    initNavbar();
  }
</script>
