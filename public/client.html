<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rent Miners - BitRent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f1f2e 0%, #1a3a4a 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    .navbar {
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 15px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 8px;
    }
    .navbar a { color: #ffa500; text-decoration: none; font-weight: bold; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #ffa500; margin-bottom: 30px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .miner-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 20px;
      transition: all 0.3s ease;
    }
    .miner-card:hover {
      border-color: #10b981;
      background: rgba(16,185,129,0.1);
      transform: translateY(-5px);
    }
    .miner-name { font-size: 1.3em; font-weight: bold; color: #10b981; margin-bottom: 10px; }
    .miner-stats { margin: 15px 0; font-size: 0.9em; color: #a0aec0; }
    .price { font-size: 1.5em; color: #ffa500; font-weight: bold; margin: 10px 0; }
    .btn {
      display: block;
      width: 100%;
      background: #10b981;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 15px;
    }
    .btn:hover { background: #059669; transform: translateY(-2px); }
    .status-online { color: #10b981; }
    .status-offline { color: #ef4444; }
  </style>
</head>
<body>
  <div class="navbar">
    <h2>BitRent Marketplace</h2>
    <a href="/">← Back to Home</a>
  </div>

  <div class="container">
    <h1>🪨 Available Miners</h1>
    
    <div class="grid">
      <div id="minersContainer" class="grid">
        <p style="text-align: center; color: #a0aec0;">Loading miners...</p>
      </div>
    </div>

    <div style="margin-top: 50px; padding: 20px; background: rgba(59,130,246,0.1); border: 1px solid #3b82f6; border-radius: 8px;">
      <h3 style="color: #3b82f6; margin-bottom: 10px;">⚡ How It Works</h3>
      <p>1. Browse available miners above</p>
      <p>2. Click "Rent Now" to start</p>
      <p>3. Authenticate with Nostr wallet</p>
      <p>4. Pay per-minute using Lightning Network</p>
      <p>5. Start mining immediately!</p>
    </div>
  </div>

  <script>
    // Load miners from API
    async function loadMiners() {
      try {
        const response = await fetch('/api/mineurs');
        const result = await response.json();
        
        if (result.status === 'ok' && result.data) {
          const container = document.getElementById('minersContainer');
          container.innerHTML = '';
          
          result.data.forEach(miner => {
            const isOnline = miner.status === 'online';
            const card = document.createElement('div');
            card.className = 'miner-card';
            card.innerHTML = `
              <div class="miner-name">${miner.name}</div>
              <div class="miner-stats">
                <p>Model: ${miner.model || 'Unknown'}</p>
                <p>Hashrate: ${miner.hashrate || 0} GH/s</p>
                <p>Status: <span class="${isOnline ? 'status-online' : 'status-offline'}">● ${miner.status}</span></p>
              </div>
              <div class="price">${miner.price_per_minute} ⚡/min</div>
              <button class="btn" ${!isOnline ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''} onclick="rentMiner('${miner.id}', '${miner.name}')">
                ${isOnline ? 'Rent Now' : 'Unavailable'}
              </button>
            `;
            container.appendChild(card);
          });
        }
      } catch (error) {
        console.error('Error loading miners:', error);
        document.getElementById('minersContainer').innerHTML = '<p style="color: #ef4444;">Failed to load miners</p>';
      }
    }

    // Rent a miner
    function rentMiner(minerId, minerName) {
      alert(`🚀 Starting rental for ${minerName}...\n\nNext steps:\n1. Sign with Nostr wallet\n2. Confirm Lightning payment\n3. Start mining!`);
      console.log('Renting miner:', minerId);
      
      // TODO: Implement actual rental flow
      // 1. Get Nostr auth challenge
      // 2. Sign with wallet
      // 3. Create rental
      // 4. Generate payment invoice
      // 5. Display QR code for Lightning payment
    }

    // Load miners on page load
    document.addEventListener('DOMContentLoaded', loadMiners);
  </script>
</body>
</html>
