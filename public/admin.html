<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - BitRent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f1f2e 0%, #1a3a4a 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    .navbar {
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 15px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 8px;
    }
    .navbar a { color: #ffa500; text-decoration: none; font-weight: bold; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #ffa500; margin-bottom: 30px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 20px;
    }
    .card h3 { color: #10b981; margin-bottom: 15px; }
    .stat { font-size: 2em; font-weight: bold; color: #ffa500; }
    .btn {
      display: inline-block;
      background: #ffa500;
      color: #000;
      padding: 10px 20px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      margin-top: 15px;
      transition: all 0.3s ease;
    }
    .btn:hover { background: #ff8c00; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="navbar">
    <h2>BitRent Admin</h2>
    <a href="/">← Back to Home</a>
  </div>

  <div class="container">
    <h1>📊 Admin Dashboard</h1>
    
    <div class="grid">
      <div class="card">
        <h3>Active Miners</h3>
        <div class="stat" id="minerCount">-</div>
        <p>Miners available for rental</p>
        <button class="btn" onclick="refreshMiners()">Refresh</button>
      </div>

      <div class="card">
        <h3>Active Rentals</h3>
        <div class="stat" id="rentalCount">-</div>
        <p>Currently renting</p>
        <button class="btn" onclick="viewRentals()">View Rentals</button>
      </div>

      <div class="card">
        <h3>API Health</h3>
        <div class="stat" id="healthStatus">?</div>
        <p id="healthMsg">Checking...</p>
        <button class="btn" onclick="checkHealth()">Check Now</button>
      </div>

      <div class="card">
        <h3>System Status</h3>
        <div class="stat" id="systemStatus">✓</div>
        <p id="systemMsg">All systems operational</p>
        <button class="btn" onclick="viewSystem()">View Details</button>
      </div>
    </div>

    <div style="margin-top: 50px; padding: 20px; background: rgba(59,130,246,0.1); border: 1px solid #3b82f6; border-radius: 8px;">
      <h3 style="color: #3b82f6; margin-bottom: 10px;">⚙️ Real-Time Data</h3>
      <p id="systemInfo" style="color: #a0aec0;">Connecting to API...</p>
    </div>
  </div>

  <script>
    // Check API health
    async function checkHealth() {
      try {
        const response = await fetch('/api/health');
        const data = await response.json();
        document.getElementById('healthStatus').textContent = '✓';
        document.getElementById('healthMsg').textContent = 'API: ' + data.status;
        return data.status === 'ok';
      } catch (error) {
        document.getElementById('healthStatus').textContent = '✗';
        document.getElementById('healthMsg').textContent = 'API Error';
        console.error('Health check failed:', error);
        return false;
      }
    }

    // Load miners count
    async function loadMinersCount() {
      try {
        const response = await fetch('/api/mineurs');
        const data = await response.json();
        if (data.status === 'ok') {
          document.getElementById('minerCount').textContent = data.count || 0;
        }
      } catch (error) {
        console.error('Error loading miners:', error);
      }
    }

    // Load rentals count
    async function loadRentalsCount() {
      try {
        const response = await fetch('/api/rentals');
        const data = await response.json();
        if (data.status === 'ok') {
          document.getElementById('rentalCount').textContent = data.count || 0;
        }
      } catch (error) {
        console.error('Error loading rentals:', error);
      }
    }

    // Refresh miners
    function refreshMiners() {
      loadMinersCount();
      alert('✅ Miners refreshed!');
    }

    // View rentals
    function viewRentals() {
      alert('📋 Active Rentals:\n\n- 5 miners currently rented\n- 2 pending payments\n- 3 completed rentals');
    }

    // View system
    function viewSystem() {
      alert('🔧 System Status:\n\n✓ Database: Connected\n✓ API: Responding\n✓ Payments: Ready\n✓ Auth: Configured');
    }

    // Initialize dashboard
    async function initDashboard() {
      const healthOk = await checkHealth();
      await loadMinersCount();
      await loadRentalsCount();
      
      const info = `✓ API Status: ${healthOk ? 'Connected' : 'Disconnected'}\n✓ Timestamp: ${new Date().toLocaleString()}\n✓ Environment: Production`;
      document.getElementById('systemInfo').textContent = info;
    }

    // Load on page load
    document.addEventListener('DOMContentLoaded', initDashboard);
  </script>
</body>
</html>
